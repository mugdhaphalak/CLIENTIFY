<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StepOne AI</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e2e8f0;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 2.5rem;
    }

    p {
      color: #94a3b8;
    }

    .container {
      margin-top: 30px;
    }

    input {
      padding: 12px;
      margin: 10px;
      width: 260px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .loading {
      margin-top: 20px;
      font-size: 18px;
      color: #38bdf8;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 800px;
      text-align: left;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .mini-card {
      background: #334155;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .section-title {
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .error {
      color: red;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>🚀 StepOne AI</h1>
  <p>AI-powered company intelligence platform</p>

  <div class="container">
    <input id="company" placeholder="Enter company name" />
    <br>
    <input id="category" placeholder="Enter category" />
    <br>
    <button onclick="analyzeCompany()">Analyze</button>
  </div>

  <div id="loading" class="loading"></div>
  <div id="result"></div>
  <div id="error" class="error"></div>

  <script src="script.js"></script>

</body>
</html>
